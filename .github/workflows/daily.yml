# Deploys static site via GitHub’s official Pages Actions flow.
# In the repo: Settings → Pages → Build and deployment → Source → "GitHub Actions"
# (If Source is left on "Deploy from branch" / gh-pages only, this workflow’s deploy step will not publish — use this source instead.)

name: Tomato Tech News Daily Automation

on:
  schedule:
    # 仅工作日 Mon–Fri，UTC 08:00（北京时间 16:00）
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
  push:
    branches:
      - main
      - tomatonewsdaily
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/daily.yml'

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_TO: ${{ secrets.NOTIFICATION_TO }}
          NOTIFICATION_TO_ZH: ${{ secrets.NOTIFICATION_TO_ZH }}
          NOTIFICATION_TO_EN: ${{ secrets.NOTIFICATION_TO_EN }}
          ENABLE_IMAGE_GENERATION: ${{ vars.ENABLE_IMAGE_GENERATION || 'false' }}
          FIREFLY_API_KEY: ${{ secrets.FIREFLY_API_KEY }}
          GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          SKIP_WEEKENDS: ${{ vars.SKIP_WEEKENDS || 'true' }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/main.py --days 1

      - name: Verify Output
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "Error: index.html not found in docs/"
            exit 1
          fi
          echo "Build successful, found docs/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
          include-hidden-files: true

      - name: Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-artifacts
          path: docs/
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
